<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>NutriTrack</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#09090b">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#09090b;--card:#18181b;--card2:#1f1f23;--border:#27272a;--border2:#3f3f46;
  --text:#fafafa;--text2:#a1a1aa;--text3:#71717a;--dim:#52525b;
  --accent:#a78bfa;--accent2:#c4b5fd;--accent-dim:rgba(167,139,250,0.1);--accent-dim2:rgba(167,139,250,0.15);
  --green:#6ee7b7;--green-dim:rgba(110,231,183,0.1);
  --red:#fca5a5;--red-dim:rgba(252,165,165,0.08);
  --blue:#93c5fd;--amber:#fcd34d;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:72px;-webkit-tap-highlight-color:transparent}
input,select,button{font-family:inherit}
input,select{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:14px;width:100%;outline:none;transition:border 0.2s}
input:focus,select:focus{border-color:var(--accent)}
input::placeholder{color:var(--dim)}
select{cursor:pointer;-webkit-appearance:none;appearance:none}
button{cursor:pointer;border:none;font-weight:500;transition:opacity 0.15s}
button:active{opacity:0.8}

.hdr{padding:24px 20px 16px;display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.hdr-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.hdr-btn svg{width:18px;height:18px}

.wrap{padding:0 20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:14px}
.card-flat{background:transparent;border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:14px}

.btn{border-radius:12px;padding:12px 20px;font-size:14px;font-weight:500;color:var(--bg);letter-spacing:-0.2px}
.btn-accent{background:var(--accent)}
.btn-green{background:var(--green);color:var(--bg)}
.btn-ghost{background:var(--card);color:var(--text2);border:1px solid var(--border)}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(252,165,165,0.15)}
.btn-sm{background:transparent;color:var(--text2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:400}

.label{font-size:12px;color:var(--text3);margin-bottom:6px;display:block;font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb14{margin-bottom:14px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}
.row{display:flex;gap:10px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;background:rgba(9,9,11,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);z-index:10;padding:4px 0}
.nav button{flex:1;padding:10px 0 8px;background:none;border:none;color:var(--dim);font-size:10px;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:4px;letter-spacing:0.3px;text-transform:uppercase;transition:color 0.2s}
.nav button.active{color:var(--accent)}
.nav button svg{width:20px;height:20px}

.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty p{font-size:14px;line-height:1.5}

.food-item{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
.food-item:last-child{border-bottom:none}
.food-item .info{flex:1;min-width:0}
.food-item .name{font-weight:500;font-size:14px;margin-bottom:3px}
.food-item .meta{font-size:12px;color:var(--text3);line-height:1.4}
.food-item .actions{display:flex;gap:6px;flex-shrink:0;margin-left:12px}

.macro-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.macro-row:last-child{margin-bottom:0}
.macro-label{font-size:12px;color:var(--text3);width:52px;flex-shrink:0;font-weight:500}
.macro-track{flex:1;height:6px;background:var(--card2);border-radius:3px;overflow:hidden}
.macro-fill{height:100%;border-radius:3px;transition:width 0.4s ease}
.macro-val{font-size:12px;font-weight:500;width:50px;text-align:right;flex-shrink:0}

.search-list{max-height:220px;overflow-y:auto;border-radius:12px;border:1px solid var(--border);background:var(--card)}
.search-item{padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.15s}
.search-item:last-child{border-bottom:none}
.search-item:hover,.search-item.sel{background:var(--accent-dim)}
.search-item.sel{border-left:2px solid var(--accent)}
.search-item .sname{font-weight:500;font-size:14px;margin-bottom:2px}
.search-item .smeta{font-size:11px;color:var(--text3)}

.preview{background:var(--accent-dim);border:1px solid var(--accent-dim2);border-radius:12px;padding:14px 16px;font-size:13px;color:var(--text2)}
.preview b{color:var(--text);font-weight:600}

.config-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px 24px;margin:60px 20px;text-align:center}
.config-box h2{margin-bottom:8px;font-size:22px;font-weight:700;letter-spacing:-0.5px}
.config-box p{font-size:13px;color:var(--text3);margin-bottom:20px;line-height:1.5}
.config-box input{margin-bottom:14px}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--card2);color:var(--text);padding:10px 24px;border-radius:12px;font-size:13px;font-weight:500;z-index:100;opacity:0;transition:opacity 0.3s;pointer-events:none;border:1px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.toast.show{opacity:1}

.overlay{position:fixed;inset:0;background:rgba(9,9,11,0.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:50}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Date nav */
.date-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.date-nav .date-label{text-align:center}
.date-nav .day{font-size:15px;font-weight:600}
.date-nav .today-badge{font-size:10px;color:var(--accent);font-weight:500;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}
.date-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.date-btn svg{width:16px;height:16px}

/* Ring */
.ring-section{display:flex;align-items:center;gap:24px;margin-bottom:4px}
.ring-wrap{position:relative;width:110px;height:110px;flex-shrink:0}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-val{font-size:24px;font-weight:700;letter-spacing:-1px}
.ring-sub{font-size:11px;color:var(--text3);margin-top:1px}

/* Section titles */
.section-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;font-weight:500;margin-bottom:10px;padding-left:4px}

/* Remove btn in entries */
.remove-btn{background:transparent;color:var(--dim);width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:all 0.15s;flex-shrink:0}
.remove-btn:hover{background:var(--red-dim);color:var(--red)}
.remove-btn svg{width:14px;height:14px}
</style>
</head>
<body>

<div id="app"></div>
<div id="toast" class="toast"></div>
<div id="overlay" class="overlay" style="display:none"><div class="spinner"></div></div>

<script>
let API_URL = localStorage.getItem("nutritrack_api_url") || "";
const GOALS_KEY = "nutritrack_goals";
let goals = JSON.parse(localStorage.getItem(GOALS_KEY) || "null") || {calories:2000,protein:150,carbs:250,fat:65,fiber:30};

let foods = [];
let logEntries = [];
let currentView = "daily";
let selectedDate = todayStr();

function todayStr(){ return new Date().toISOString().split("T")[0]; }
function fmtDate(s){ const d=new Date(s+"T12:00:00"); return d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}); }
function normalizeDate(d){ return String(d).substring(0,10); }
function getFood(id){ return foods.find(f=>f.id===id); }
function dayEntries(date){ return logEntries.filter(e=>normalizeDate(e.date)===date); }
function dayTotals(date){
  const t={calories:0,protein:0,fat:0,carbs:0,fiber:0};
  dayEntries(date).forEach(e=>{
    const f=getFood(e.foodId); if(!f) return;
    t.calories+=f.calories*e.qty; t.protein+=f.protein*e.qty;
    t.fat+=f.fat*e.qty; t.carbs+=f.carbs*e.qty; t.fiber+=f.fiber*e.qty;
  });
  return t;
}

// Icons as SVG
const icons = {
  chevL: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>`,
  chevR: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>`,
  settings: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`,
  chart: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>`,
  apple: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2C9.5 2 8 4 8 4s-4-.5-5 3c-1 3.5.5 7 3 10s4 4 6 4 3.5-1 6-4 4-6.5 3-10c-1-3.5-5-3-5-3s-1.5-2-4-2z"/><path d="M12 2c0 2-2 4-2 4"/></svg>`,
  target: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>`,
  plus: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  x: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
  refresh: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>`,
};

function toast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  setTimeout(()=> t.classList.remove("show"), 2000);
}
function showLoading(){ document.getElementById("overlay").style.display="flex"; }
function hideLoading(){ document.getElementById("overlay").style.display="none"; }

async function api(action, params={}, body=null){
  const url = new URL(API_URL);
  url.searchParams.set("action", action);
  Object.entries(params).forEach(([k,v])=> url.searchParams.set(k,v));
  if(body) url.searchParams.set("payload", JSON.stringify(body));
  const r = await fetch(url.toString(), { method: "GET", redirect: "follow" });
  if(!r.ok) throw new Error("HTTP " + r.status);
  return r.json();
}

async function loadAll(){
  showLoading();
  try{
    const [fr, lr] = await Promise.all([api("getFoods"), api("getAllLog")]);
    if(fr.foods) foods = fr.foods;
    if(lr.entries) logEntries = lr.entries;
  }catch(e){ toast("Failed to load data"); console.error(e); }
  hideLoading(); render();
}

async function loadLogOnly(){
  const r = await api("getAllLog");
  if(r.entries) logEntries = r.entries;
}

function navigate(view){ currentView=view; render(); }
function shiftDate(n){
  const d=new Date(selectedDate+"T12:00:00"); d.setDate(d.getDate()+n);
  selectedDate=d.toISOString().split("T")[0]; render();
}

// ---- RENDER ----
function macroRow(label, val, max, color){
  const pct=max>0?Math.min(val/max*100,100):0;
  return `<div class="macro-row"><span class="macro-label">${label}</span><div class="macro-track"><div class="macro-fill" style="width:${pct}%;background:${color}"></div></div><span class="macro-val" style="color:${color}">${Math.round(val)}${label==="Cal"?"":"g"}</span></div>`;
}

function render(){
  const app=document.getElementById("app");

  if(!API_URL){
    app.innerHTML=`
      <div class="config-box">
        <h2>NutriTrack</h2>
        <p>Connect your Google Sheet to start tracking. Paste your Apps Script deployment URL below.</p>
        <input id="apiInput" placeholder="https://script.google.com/macros/s/..." />
        <button class="btn btn-accent" style="width:100%" onclick="saveApiUrl()">Connect</button>
      </div>`;
    return;
  }

  let navHtml=`<div class="nav">
    <button class="${currentView==="daily"||currentView==="addEntry"?"active":""}" onclick="navigate('daily')">${icons.chart}<span>Daily</span></button>
    <button class="${currentView==="foods"||currentView==="addFood"?"active":""}" onclick="navigate('foods')">${icons.apple}<span>Foods</span></button>
    <button class="${currentView==="goals"?"active":""}" onclick="navigate('goals')">${icons.target}<span>Goals</span></button>
  </div>`;

  let h=`<div class="hdr"><h1>NutriTrack</h1><button class="hdr-btn" onclick="navigate('settings')">${icons.settings}</button></div><div class="wrap">`;

  switch(currentView){
    case "daily": h+=renderDaily(); break;
    case "foods": h+=renderFoods(); break;
    case "addFood": h+=renderFoodForm(); break;
    case "addEntry": h+=renderEntryForm(); break;
    case "goals": h+=renderGoals(); break;
    case "settings": h+=renderSettings(); break;
  }
  h+=`</div>`;
  app.innerHTML = h + navHtml;

  if(currentView === "addEntry"){
    const si = document.getElementById("searchInput");
    if(si && document._restoreFocus){
      si.focus(); si.selectionStart = si.selectionEnd = si.value.length;
      document._restoreFocus = false;
    }
  }
}

// ---- DAILY ----
function renderDaily(){
  const t=dayTotals(selectedDate);
  const entries=dayEntries(selectedDate);
  const isToday=selectedDate===todayStr();
  const pct=goals.calories>0?Math.min(t.calories/goals.calories*100,100):0;
  const over=t.calories>goals.calories;
  const ringColor=over?"var(--red)":"var(--accent)";
  const remaining=Math.max(0,goals.calories-t.calories);

  let h=`
    <div class="date-nav">
      <button class="date-btn" onclick="shiftDate(-1)">${icons.chevL}</button>
      <div class="date-label"><div class="day">${fmtDate(selectedDate)}</div>${isToday?'<div class="today-badge">Today</div>':''}</div>
      <button class="date-btn" onclick="shiftDate(1)">${icons.chevR}</button>
    </div>

    <div class="card mb20">
      <div class="ring-section">
        <div class="ring-wrap">
          <svg viewBox="0 0 36 36" style="width:110px;height:110px;transform:rotate(-90deg)">
            <circle cx="18" cy="18" r="15.9" fill="none" stroke="var(--card2)" stroke-width="2.5"/>
            <circle cx="18" cy="18" r="15.9" fill="none" stroke="${ringColor}" stroke-width="2.5" stroke-dasharray="${pct} 100" stroke-linecap="round" style="transition:stroke-dasharray 0.5s ease"/>
          </svg>
          <div class="ring-center">
            <div class="ring-val">${Math.round(t.calories)}</div>
            <div class="ring-sub">${over?'over by '+Math.round(t.calories-goals.calories):Math.round(remaining)+' left'}</div>
          </div>
        </div>
        <div style="flex:1">
          ${macroRow("Protein",t.protein,goals.protein,"var(--accent)")}
          ${macroRow("Carbs",t.carbs,goals.carbs,"var(--green)")}
          ${macroRow("Fat",t.fat,goals.fat,"var(--amber)")}
          ${macroRow("Fiber",t.fiber,goals.fiber,"var(--blue)")}
        </div>
      </div>
    </div>

    <button class="btn btn-accent mb20" style="width:100%;padding:14px;border-radius:14px;display:flex;align-items:center;justify-content:center;gap:8px" onclick="entrySearch='';entryFoodId='';entryQty='1';navigate('addEntry')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="width:16px;height:16px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Log Food
    </button>`;

  if(entries.length===0){
    h+=`<div class="empty"><p>Nothing logged yet.<br>Tap above to start tracking.</p></div>`;
  } else {
    h+=`<div class="section-title">Today's log</div>`;
    h+=`<div class="card" style="padding:0;overflow:hidden">`;
    entries.forEach(e=>{
      const f=getFood(e.foodId); if(!f) return;
      const cal=Math.round(f.calories*e.qty);
      h+=`<div class="food-item">
        <div class="info">
          <div class="name">${f.name}</div>
          <div class="meta">${e.qty} serving${e.qty!==1?'s':''} · ${cal} kcal · ${Math.round(f.protein*e.qty)}g P · ${Math.round(f.fat*e.qty)}g F · ${Math.round(f.carbs*e.qty)}g C</div>
        </div>
        <button class="remove-btn" onclick="doDeleteLog('${e.id}')">${icons.x}</button>
      </div>`;
    });
    h+=`</div>`;
  }
  return h;
}

async function doDeleteLog(id){
  logEntries = logEntries.filter(e=>e.id!==id);
  render(); toast("Removed");
  try{ await api("deleteLogEntry",{id}); }catch(e){ console.error(e); }
}

// ---- FOODS ----
function renderFoods(){
  let h=`<div style="display:flex;justify-content:space-between;align-items:center" class="mb20">
    <div><h2 style="font-size:18px;font-weight:600;letter-spacing:-0.3px">Food Library</h2><p style="font-size:12px;color:var(--text3);margin-top:2px">${foods.length} item${foods.length!==1?'s':''}</p></div>
    <button class="btn btn-accent" style="display:flex;align-items:center;gap:6px;padding:10px 16px" onclick="startAddFood()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="width:14px;height:14px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add</button>
  </div>`;
  if(foods.length===0){
    h+=`<div class="empty"><p>No foods yet.<br>Add items from nutrition labels.</p></div>`;
  } else {
    h+=`<div class="card" style="padding:0;overflow:hidden">`;
    foods.forEach(f=>{
      h+=`<div class="food-item">
        <div class="info">
          <div class="name">${f.name}</div>
          <div class="meta">Per ${f.servingSize} ${f.servingUnit} · ${f.calories} kcal · P ${f.protein}g · F ${f.fat}g · C ${f.carbs}g · Fiber ${f.fiber}g</div>
        </div>
        <div class="actions">
          <button class="btn-sm" onclick="startEditFood('${f.id}')">Edit</button>
          <button class="remove-btn" onclick="doDeleteFood('${f.id}')">${icons.x}</button>
        </div>
      </div>`;
    });
    h+=`</div>`;
  }
  return h;
}

let foodForm={name:"",servingSize:"",servingUnit:"g",calories:"",protein:"",fat:"",carbs:"",fiber:""};
let editingFoodId=null;

function startAddFood(){
  editingFoodId=null;
  foodForm={name:"",servingSize:"",servingUnit:"g",calories:"",protein:"",fat:"",carbs:"",fiber:""};
  navigate("addFood");
}
function startEditFood(id){
  const f=getFood(id); editingFoodId=id;
  foodForm={name:f.name,servingSize:String(f.servingSize),servingUnit:f.servingUnit,calories:String(f.calories),protein:String(f.protein),fat:String(f.fat),carbs:String(f.carbs),fiber:String(f.fiber)};
  navigate("addFood");
}

function renderFoodForm(){
  const title=editingFoodId?"Edit Food":"Add Food";
  return `<h2 style="font-size:18px;font-weight:600;letter-spacing:-0.3px" class="mb20">${title}</h2>
    <div class="card">
      <div class="mb14"><label class="label">Name</label><input value="${esc(foodForm.name)}" placeholder="e.g. Greek Yogurt" oninput="foodForm.name=this.value"/></div>
      <div class="row mb14">
        <div style="flex:1"><label class="label">Serving size</label><input type="number" value="${esc(foodForm.servingSize)}" placeholder="100" oninput="foodForm.servingSize=this.value"/></div>
        <div style="width:100px"><label class="label">Unit</label><select onchange="foodForm.servingUnit=this.value">
          ${["g","ml","oz","cup","tbsp","tsp","piece","scoop","slice","serving"].map(u=>`<option value="${u}"${foodForm.servingUnit===u?" selected":""}>${u}</option>`).join("")}
        </select></div>
      </div>
      <div class="grid2 mb14">
        <div><label class="label">Calories</label><input type="number" value="${esc(foodForm.calories)}" placeholder="0" oninput="foodForm.calories=this.value"/></div>
        <div><label class="label">Protein (g)</label><input type="number" value="${esc(foodForm.protein)}" placeholder="0" oninput="foodForm.protein=this.value"/></div>
        <div><label class="label">Fat (g)</label><input type="number" value="${esc(foodForm.fat)}" placeholder="0" oninput="foodForm.fat=this.value"/></div>
        <div><label class="label">Carbs (g)</label><input type="number" value="${esc(foodForm.carbs)}" placeholder="0" oninput="foodForm.carbs=this.value"/></div>
        <div><label class="label">Fiber (g)</label><input type="number" value="${esc(foodForm.fiber)}" placeholder="0" oninput="foodForm.fiber=this.value"/></div>
      </div>
      <div class="row">
        <button class="btn btn-ghost" style="flex:1" onclick="navigate('foods')">Cancel</button>
        <button class="btn btn-accent" style="flex:1" onclick="doSaveFood()">Save</button>
      </div>
    </div>`;
}

function esc(s){ return String(s).replace(/"/g,"&quot;").replace(/</g,"&lt;"); }

async function doSaveFood(){
  if(!foodForm.name||!foodForm.servingSize||!foodForm.calories) return toast("Fill required fields");
  const obj={name:foodForm.name.trim(),servingSize:parseFloat(foodForm.servingSize),servingUnit:foodForm.servingUnit,calories:parseFloat(foodForm.calories),protein:parseFloat(foodForm.protein)||0,fat:parseFloat(foodForm.fat)||0,carbs:parseFloat(foodForm.carbs)||0,fiber:parseFloat(foodForm.fiber)||0};
  if(editingFoodId){
    obj.id=editingFoodId;
    const idx=foods.findIndex(f=>f.id===editingFoodId);
    if(idx>=0) foods[idx]=obj;
  } else {
    obj.id="temp_"+Date.now();
    foods.push(obj);
  }
  const wasEditing=!!editingFoodId;
  editingFoodId=null; currentView="foods";
  render(); toast(wasEditing?"Updated":"Added");
  try{
    if(wasEditing){ await api("updateFood",{},obj); }
    else{ const r=await api("addFood",{},obj); if(r.id){ const f=foods.find(f=>f.id===obj.id); if(f) f.id=r.id; } }
  }catch(e){ console.error(e); }
}

async function doDeleteFood(id){
  if(!confirm("Delete this food?")) return;
  foods = foods.filter(f=>f.id!==id);
  render(); toast("Deleted");
  try{ await api("deleteFood",{id}); }catch(e){ console.error(e); }
}

// ---- ADD ENTRY ----
let entrySearch="", entryFoodId="", entryQty="1";

function renderEntryForm(){
  const filtered=foods.filter(f=>f.name.toLowerCase().includes(entrySearch.toLowerCase()));
  const sel=getFood(entryFoodId);
  let h=`<h2 style="font-size:18px;font-weight:600;letter-spacing:-0.3px" class="mb20">Log Food<span style="color:var(--text3);font-weight:400;font-size:14px;margin-left:8px">${fmtDate(selectedDate)}</span></h2>`;
  if(foods.length===0){
    return h+`<div class="card" style="text-align:center;padding:32px"><p style="color:var(--text3);margin-bottom:16px">Add foods to your library first.</p><button class="btn btn-accent" onclick="startAddFood()">Add Food</button></div>`;
  }

  h+=`<div class="mb14"><label class="label">Search</label><input id="searchInput" value="${esc(entrySearch)}" placeholder="Search your foods..." oninput="handleSearch(this.value)"/></div>
    <div class="search-list mb14">`;
  if(filtered.length===0){
    h+=`<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px">No matches</div>`;
  } else {
    filtered.forEach(f=>{
      h+=`<div class="search-item${entryFoodId===f.id?' sel':''}" onclick="selectEntryFood('${f.id}')"><div class="sname">${f.name}</div><div class="smeta">${f.calories} kcal · P ${f.protein}g · F ${f.fat}g · C ${f.carbs}g per ${f.servingSize} ${f.servingUnit}</div></div>`;
    });
  }
  h+=`</div>
    <div class="mb14"><label class="label">Servings</label><input type="number" step="0.25" min="0.25" value="${entryQty}" oninput="entryQty=this.value;updatePreview()"/></div>
    <div id="entryPreview" class="mb14">`;
  if(sel){
    const q=parseFloat(entryQty)||0;
    h+=`<div class="preview"><b>Total:</b> ${Math.round(sel.calories*q)} kcal · P ${Math.round(sel.protein*q)}g · F ${Math.round(sel.fat*q)}g · C ${Math.round(sel.carbs*q)}g</div>`;
  }
  h+=`</div>
    <div class="row">
      <button class="btn btn-ghost" style="flex:1" onclick="navigate('daily')">Cancel</button>
      <button class="btn btn-accent" style="flex:1;opacity:${entryFoodId?1:0.4}" onclick="doAddEntry()" ${entryFoodId?'':'disabled'}>Log Entry</button>
    </div>`;
  return h;
}

function handleSearch(val){
  entrySearch=val; entryFoodId="";
  const filtered=foods.filter(f=>f.name.toLowerCase().includes(val.toLowerCase()));
  const listEl=document.querySelector(".search-list");
  if(!listEl) return;
  let html="";
  if(filtered.length===0){ html=`<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px">No matches</div>`; }
  else { filtered.forEach(f=>{ html+=`<div class="search-item" onclick="selectEntryFood('${f.id}')"><div class="sname">${f.name}</div><div class="smeta">${f.calories} kcal · P ${f.protein}g · F ${f.fat}g · C ${f.carbs}g per ${f.servingSize} ${f.servingUnit}</div></div>`; }); }
  listEl.innerHTML=html;
  const prev=document.getElementById("entryPreview"); if(prev) prev.innerHTML="";
}

function selectEntryFood(id){
  entryFoodId=id;
  const f=getFood(id); if(!f) return;
  const si=document.getElementById("searchInput");
  if(si) si.value=f.name;
  entrySearch=f.name;
  document.querySelectorAll(".search-item").forEach(el=>{
    el.classList.remove("sel");
    if(el.querySelector(".sname").textContent===f.name) el.classList.add("sel");
  });
  updatePreview();
  const btn=document.querySelector(".btn-accent[onclick='doAddEntry()']");
  if(btn){ btn.disabled=false; btn.style.opacity=1; }
}

function updatePreview(){
  const f=getFood(entryFoodId);
  const prev=document.getElementById("entryPreview");
  if(!prev) return;
  if(!f){ prev.innerHTML=""; return; }
  const q=parseFloat(entryQty)||0;
  prev.innerHTML=`<div class="preview"><b>Total:</b> ${Math.round(f.calories*q)} kcal · P ${Math.round(f.protein*q)}g · F ${Math.round(f.fat*q)}g · C ${Math.round(f.carbs*q)}g</div>`;
}

async function doAddEntry(){
  if(!entryFoodId) return;
  const qty=parseFloat(entryQty)||1;
  const time=new Date().toISOString();
  const tempId="temp_"+Date.now();
  const fId=entryFoodId;
  logEntries.push({id:tempId, date:selectedDate, foodId:fId, qty, time});
  entrySearch=""; entryFoodId=""; entryQty="1";
  currentView="daily"; render(); toast("Logged!");
  try{
    const r=await api("addLogEntry",{},{date:selectedDate,foodId:fId,qty,time});
    if(r.id){ const entry=logEntries.find(e=>e.id===tempId); if(entry) entry.id=r.id; }
  }catch(e){ console.error(e); }
}

// ---- GOALS ----
let goalsForm={...goals};

function renderGoals(){
  goalsForm={...goals};
  let h=`<h2 style="font-size:18px;font-weight:600;letter-spacing:-0.3px" class="mb20">Daily Goals</h2><div class="card">`;
  [["calories","Calories (kcal)"],["protein","Protein (g)"],["carbs","Carbs (g)"],["fat","Fat (g)"],["fiber","Fiber (g)"]].forEach(([k,l])=>{
    h+=`<div class="mb14"><label class="label">${l}</label><input type="number" value="${goalsForm[k]}" oninput="goalsForm.${k}=parseFloat(this.value)||0"/></div>`;
  });
  h+=`<div class="row"><button class="btn btn-ghost" style="flex:1" onclick="navigate('daily')">Cancel</button><button class="btn btn-accent" style="flex:1" onclick="doSaveGoals()">Save</button></div></div>`;
  return h;
}

function doSaveGoals(){
  goals={...goalsForm};
  localStorage.setItem(GOALS_KEY,JSON.stringify(goals));
  toast("Goals saved"); navigate("daily");
}

// ---- SETTINGS ----
function renderSettings(){
  return `<h2 style="font-size:18px;font-weight:600;letter-spacing:-0.3px" class="mb20">Settings</h2>
    <div class="card mb14">
      <div class="mb14"><label class="label">Apps Script URL</label><input id="settingsUrl" value="${esc(API_URL)}"/></div>
      <div class="row">
        <button class="btn btn-ghost" style="flex:1" onclick="navigate('daily')">Cancel</button>
        <button class="btn btn-accent" style="flex:1" onclick="doUpdateUrl()">Save</button>
      </div>
    </div>
    <button class="btn btn-ghost" style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px" onclick="loadAll()">${icons.refresh} Reload from Sheet</button>`;
}

function doUpdateUrl(){
  const v=document.getElementById("settingsUrl").value.trim();
  if(!v) return toast("URL required");
  API_URL=v; localStorage.setItem("nutritrack_api_url",v);
  toast("URL updated"); loadAll();
}

function saveApiUrl(){
  const v=document.getElementById("apiInput").value.trim();
  if(!v) return toast("Paste your Apps Script URL");
  API_URL=v; localStorage.setItem("nutritrack_api_url",v);
  toast("Connected!"); loadAll();
}

render();
if(API_URL) loadAll();
</script>
